name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.1
        required: true
        type: string
      draft:
        description: Create the GitHub release as a draft
        required: true
        default: true
        type: boolean
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: false
        type: boolean

run-name: Release v${{ inputs.version }}

permissions:
  contents: write

concurrency:
  group: release-v${{ inputs.version }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release input
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply release version
        run: node .github/scripts/apply-release-version.mjs
        env:
          APP_VERSION: ${{ inputs.version }}

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

  release:
    name: Build and upload (${{ matrix.name }})
    needs: verify
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            platform: windows-latest
            rust-target: ''
            args: ''
          - name: macOS Apple Silicon
            platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: macOS Intel
            platform: macos-latest
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - name: Install dependencies
        run: npm ci

      - name: Apply release version
        run: node .github/scripts/apply-release-version.mjs
        env:
          APP_VERSION: ${{ inputs.version }}

      - name: Build release bundle
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tauriScript: npm run tauri
          tagName: v${{ inputs.version }}
          releaseName: Math Notebook Lab v${{ inputs.version }}
          releaseBody: Desktop builds for Windows and macOS.
          releaseDraft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          releaseAssetNamePattern: math-notebook-lab-v${{ inputs.version }}-[platform]-[arch]-[bundle][setup][ext]
